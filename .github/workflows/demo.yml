name: Demo

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  capture:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Generate sample runner activity
        run: echo "This step will appear in the internal Worker log."

      - name: Capture runner internal logs
        if: always()
        uses: ./
        with:
          artifact-name: demo-runner-internal-logs-${{ matrix.os }}
          retention-days: 1
